<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Navbar</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css" rel="stylesheet" />
    <link rel="stylesheet" href="./assets/css/style.css">


</head>

<body>

    <header>
        <div class="container">
            <div class="d-flex justify-content-between align-items-center py-3">

                <div class="logo text-white fw-bold">MyLogo</div>

                <nav class="d-none d-lg-block">
                    <ul class="d-flex gap-4 list-unstyled text-white m-0">
                        <li>Home</li>
                        <li>About</li>
                        <li>Services</li>
                        <li>Contact</li>
                    </ul>
                </nav>

                <div class="d-flex align-items-center gap-3">

                    <button id="themeBtn" class="btn btn-dark">🌙</button>

                    <div class="d-lg-none">
                        <button class="btn text-white p-0 border-0" data-bs-toggle="offcanvas" data-bs-target="#menu">
                            <i class="ri-menu-2-line fs-3"></i>
                        </button>
                    </div>

                </div>

            </div>
        </div>
    </header>

    <section class="hero text-center">
        <h1 class="title">Responsive Navbar 🚀</h1>
        <p class="subtitle">Hamburger Menu + Theme Toggle</p>

        <div class="container mt-5">
            <div class="row g-4 justify-content-center">

                <div class="col-12 col-md-6 col-lg-3">
                    <div class="mini-card p-3">
                        <i class="ri-smartphone-line fs-2"></i>
                        <p class="mt-2">Responsive</p>
                    </div>
                </div>

                <div class="col-12 col-md-6 col-lg-3">
                    <div class="mini-card p-3">
                        <i class="ri-moon-line fs-2"></i>
                        <p class="mt-2">Dark Mode</p>
                    </div>
                </div>

                <div class="col-12 col-md-6 col-lg-3">
                    <div class="mini-card p-3">
                        <i class="ri-menu-line fs-2"></i>
                        <p class="mt-2">Hamburger</p>
                    </div>
                </div>

                <div class="col-12 col-md-6 col-lg-3">
                    <div class="mini-card p-3">
                        <i class="ri-speed-up-line fs-2"></i>
                        <p class="mt-2">Fast UI</p>
                    </div>
                </div>

            </div>
        </div>
    </section>

    <div class="offcanvas offcanvas-start" id="menu">
        <div class="offcanvas-header">
            <h5>Menu</h5>
            <button class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>

        <div class="offcanvas-body">
            <ul class="list-unstyled">
                <li class="mb-3">Home</li>
                <li class="mb-3">About</li>
                <li class="mb-3">Services</li>
                <li class="mb-3">Contact</li>
            </ul>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./assets/js/script.js"></script>

</body>

</html>
