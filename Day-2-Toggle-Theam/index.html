<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link id="favicon" rel="icon" href="./assets/images/light.jpg">
    <title>Theme Toggle</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/style.css">

</head>

<body>

    <nav class=" navbar glass-nav shadow-sm px-4">
        <div class="container-fluid d-flex justify-content-between align-items-center">
            <span class="fw-bold">Theme Toggle</span>

            <button id="headerBtn" class="btn btn-dark theme-btn">🌙</button>
        </div>
    </nav>

    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="glass-card text-center">

            <h2>Welcome 👋</h2>

            <p id="themeText">☀️ Light Theme Active</p>

            <div class="d-flex justify-content-center align-items-center gap-2 mt-3">
                <label class="switch">
                    <input type="checkbox" id="cardToggle" placeholder="checkbox">
                    <span class="slider"></span>
                </label>
                <span id="cardIcon">🌙</span>
            </div>

        </div>
    </div>

    <script src="./assets/js/script.js"></script>

</body>

</html>
