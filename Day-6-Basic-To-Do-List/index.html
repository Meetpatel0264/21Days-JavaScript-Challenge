<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Todo</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>

    <div class="app-wrapper">
        <div class="todo-box">
            <div class="card-body p-4">

                <div class="todo-head text-center">
                    <h1 class="todo-heading">Todo</h1>
                </div>

                <div class="mb-4">
                    <div class="input-group mb-3">
                        <input type="text" class="form-control" placeholder="What needs to be done?" id="todoInput">
                        <button class="btn btn-add px-4" type="button" id="addBtn" onclick="addTask()" title="btnadd">
                            <i class="fas fa-plus"></i>
                        </button>
                    </div>

                    <select class="form-select" id="prioritySelect" title="name">
                        <option value="-1">Select Priority</option>
                        <option value="1">🔴 High Priority</option>
                        <option value="2">🔸 Medium Priority</option>
                        <option value="3">🟢 Low Priority</option>
                    </select>
                </div>

                <div id="todoList">
                    <div class="empty-area">
                        <div class="empty-symbol">
                            <i class="fas fa-check-circle"></i>
                        </div>
                        <p>Your to-do list is Empty! Add a task</p>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
    <script src="./assets/js/index.js"></script>


    <script>
     
    </script>
</body>
</html>
